<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Check</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --ocean-1: #0a1628;
      --ocean-2: #0d2b4e;
      --ocean-3: #0a3a5c;
      --sky:     #38bdf8;
      --sky-dim: rgba(56,189,248,0.12);
      --glass:   rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.09);
    }

    body {
      background: linear-gradient(160deg, var(--ocean-1) 0%, var(--ocean-2) 50%, var(--ocean-3) 100%);
      min-height: 100vh;
      color: #e2f0fb;
    }

    /* glass card */
    .glass-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.3s;
    }

    .glass-card:hover { transform: translateY(-3px); }
    .glass-card.border-success { border-color: #10b981 !important; }
    .glass-card.border-warning { border-color: #f59e0b !important; }
    .glass-card.border-danger  { border-color: #ef4444 !important; }

    /* header */
    .site-title { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; }
    .site-title span { color: var(--sky); }

    /* search */
    .search-input {
      background: var(--glass);
      border: 1px solid #1e4a70;
      color: #e2f0fb;
      border-radius: 0.75rem !important;
    }
    .search-input::placeholder { color: #64748b; }
    .search-input:focus {
      background: var(--glass);
      border-color: var(--sky);
      color: #e2f0fb;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .btn-search {
      background: var(--sky);
      color: #0a1628;
      font-weight: 700;
      border-radius: 0.75rem !important;
      border: none;
    }
    .btn-search:hover { background: #7dd3fc; color: #0a1628; }

    .btn-gps {
      background: var(--sky-dim);
      color: var(--sky);
      border: 1px solid #1e4a70;
      border-radius: 0.75rem !important;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-gps:hover { background: rgba(56,189,248,0.25); color: #7dd3fc; border-color: var(--sky); }
    .btn-gps.loading { animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* rating banner */
    #rating-banner {
      border-radius: 1rem;
      opacity: 0;
      transition: opacity 0.4s;
      display: none;
    }
    #rating-banner.visible { opacity: 1; display: flex !important; }
    #rating-banner.excellent { background: linear-gradient(90deg,#064e3b,#065f46); border: 1px solid #10b981; color: #6ee7b7; }
    #rating-banner.good      { background: linear-gradient(90deg,#0c4a6e,#075985); border: 1px solid var(--sky); color: #bae6fd; }
    #rating-banner.fair      { background: linear-gradient(90deg,#451a03,#78350f); border: 1px solid #f59e0b; color: #fde68a; }
    #rating-banner.poor      { background: linear-gradient(90deg,#450a0a,#7f1d1d); border: 1px solid #f87171; color: #fca5a5; }

    /* stat cards */
    .stat-icon { font-size: 2.2rem; }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
    .stat-value { font-size: 1.9rem; font-weight: 800; color: #f1f5f9; line-height: 1; }
    .stat-unit  { font-size: 0.82rem; color: #94a3b8; }
    .stat-sub   { font-size: 0.8rem; color: #7dd3fc; }

    /* pills */
    .pill { padding: 3px 12px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
    .pill.green  { background: #064e3b; color: #6ee7b7; }
    .pill.yellow { background: #451a03; color: #fde68a; }
    .pill.red    { background: #450a0a; color: #fca5a5; }

    /* tide */
    #tide-section { opacity: 0; transition: opacity 0.4s; }
    #tide-section.visible { opacity: 1; }

    .tide-now-value { font-size: 2.4rem; font-weight: 800; color: #f1f5f9; }
    .tide-now-value small { font-size: 1rem; color: #94a3b8; font-weight: 400; }

    .tide-badge { padding: 6px 16px; border-radius: 999px; font-size: 0.85rem; font-weight: 700; }
    .tide-badge.enchendo { background: #0c4a6e; color: var(--sky);   border: 1px solid var(--sky); }
    .tide-badge.vazando  { background: #451a03; color: #fb923c;      border: 1px solid #fb923c; }
    .tide-badge.cheia    { background: #064e3b; color: #34d399;      border: 1px solid #34d399; }
    .tide-badge.seca     { background: #3b0764; color: #c084fc;      border: 1px solid #c084fc; }

    .tide-chart-wrap svg { width: 100%; height: 130px; overflow: visible; }

    .tide-hours { display: flex; justify-content: space-between; margin-top: 4px; }
    .tide-hours span { font-size: 0.68rem; color: #475569; flex: 1; text-align: center; }
    .tide-hours span.now-label { color: var(--sky); font-weight: 700; }

    .tide-extreme {
      background: rgba(255,255,255,0.04);
      border-radius: 0.75rem;
      padding: 12px 14px;
    }
    .te-time  { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .te-type  { font-size: 0.82rem; font-weight: 700; }
    .te-type.high { color: #34d399; }
    .te-type.low  { color: #c084fc; }
    .te-height { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }

    /* section label */
    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #475569;
      font-weight: 600;
    }

    footer { color: #334155; font-size: 0.75rem; }
    footer a { color: #475569; text-decoration: none; }
    footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>

<div class="container py-5" style="max-width:900px">

  <!-- Header -->
  <header class="text-center mb-5">
    <h1 class="site-title mb-1">🌊 Wave<span>Check</span></h1>
    <p class="text-secondary mb-0">Condições de surf em tempo real</p>
  </header>

  <!-- Search -->
  <div class="mb-4">
    <div class="input-group mb-2">
      <input
        type="text"
        id="location-input"
        class="form-control search-input"
        placeholder="Ex: Florianópolis, Ubatuba, Itacaré…"
      />
      <button class="btn btn-search px-4" onclick="searchLocation()">
        <i class="bi bi-search me-1"></i> Buscar
      </button>
    </div>
    <div class="d-grid">
      <button id="gps-btn" class="btn btn-gps py-2" onclick="useMyLocation()">
        <i class="bi bi-geo-alt-fill me-2"></i>Usar minha localização
      </button>
    </div>
  </div>

  <!-- Rating banner -->
  <div id="rating-banner" class="d-flex align-items-center gap-3 p-4 mb-4">
    <span id="banner-icon" style="font-size:2rem"></span>
    <span id="banner-text" class="fw-semibold fs-5"></span>
  </div>

  <!-- Stat cards -->
  <div class="row g-3 mb-2" id="cards-grid"></div>

  <!-- Tide section -->
  <section id="tide-section" class="mt-4">
    <p class="section-label mb-3"><i class="bi bi-water me-1"></i> Tábua de Maré</p>
    <div class="glass-card p-4">

      <!-- Current tide -->
      <div class="d-flex align-items-center gap-3 flex-wrap mb-4">
        <div>
          <div class="section-label mb-1">Maré Agora</div>
          <div class="tide-now-value" id="tide-current-val">—<small> m</small></div>
        </div>
        <div id="tide-arrow" style="font-size:1.8rem"></div>
        <div id="tide-status-badge" class="tide-badge">—</div>
      </div>

      <!-- Chart -->
      <div class="tide-chart-wrap">
        <svg id="tide-svg" viewBox="0 0 860 130" preserveAspectRatio="none"></svg>
        <div class="tide-hours" id="tide-hours"></div>
      </div>

      <!-- Extremes -->
      <div class="row g-2 mt-3" id="tide-extremes"></div>

    </div>
  </section>

  <!-- Loading -->
  <div id="loading" class="text-center py-5" style="display:none">
    <div class="spinner-border text-info mb-3" role="status" style="width:3rem;height:3rem"></div>
    <div class="text-secondary">Carregando dados...</div>
  </div>

  <!-- Error -->
  <div id="error-msg" class="alert alert-danger mt-3" role="alert" style="display:none"></div>

  <!-- Footer -->
  <footer class="text-center mt-5">
    Dados por <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &amp;
    <a href="https://nominatim.openstreetmap.org" target="_blank">OpenStreetMap Nominatim</a>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const WMO_CODES = {
    0:  { label: 'Céu limpo',            icon: '☀️' },
    1:  { label: 'Predominante limpo',   icon: '🌤️' },
    2:  { label: 'Parcialmente nublado', icon: '⛅' },
    3:  { label: 'Nublado',              icon: '☁️' },
    45: { label: 'Neblina',              icon: '🌫️' },
    48: { label: 'Neblina com gelo',     icon: '🌫️' },
    51: { label: 'Garoa leve',           icon: '🌦️' },
    53: { label: 'Garoa moderada',       icon: '🌦️' },
    55: { label: 'Garoa intensa',        icon: '🌧️' },
    61: { label: 'Chuva leve',           icon: '🌧️' },
    63: { label: 'Chuva moderada',       icon: '🌧️' },
    65: { label: 'Chuva forte',          icon: '🌧️' },
    80: { label: 'Pancadas leves',       icon: '🌦️' },
    81: { label: 'Pancadas moderadas',   icon: '🌧️' },
    82: { label: 'Pancadas intensas',    icon: '⛈️' },
    95: { label: 'Tempestade',           icon: '⛈️' },
    99: { label: 'Tempestade c/ granizo',icon: '⛈️' },
  };

  const wmoInfo    = c => WMO_CODES[c] || { label: 'Desconhecido', icon: '❓' };
  const compassDir = d => ['N','NE','L','SE','S','SO','O','NO'][Math.round(d / 45) % 8];
  const pillLabel  = c => ({ green: 'Ótimo', yellow: 'Regular', red: 'Ruim' })[c];

  function windRating(s)    { return s < 15 ? 'green' : s < 25 ? 'yellow' : 'red'; }
  function periodRating(p)  { return p >= 12 ? 'green' : p >= 8 ? 'yellow' : 'red'; }
  function heightRating(h)  { return (h >= 1 && h <= 2.5) ? 'green' : (h > 0.3 && h < 4) ? 'yellow' : 'red'; }
  function weatherRating(c) { return c <= 2 ? 'green' : c <= 55 ? 'yellow' : 'red'; }

  function overallRating(wind, period, height, weather) {
    const s = { green: 3, yellow: 2, red: 1 };
    const total = s[wind] + s[period] + s[height] * 1.2 + s[weather] * 0.8;
    const pct   = total / (3 + 3 + 3.6 + 2.4);
    return pct >= 0.8 ? 'excellent' : pct >= 0.6 ? 'good' : pct >= 0.4 ? 'fair' : 'poor';
  }

  const RATINGS = {
    excellent: { icon: '🏄', text: 'Condições excelentes — hora de pegar as ondas!', cls: 'excellent' },
    good:      { icon: '✅', text: 'Boas condições para surfar.',                     cls: 'good' },
    fair:      { icon: '⚠️', text: 'Condições regulares — surf possível com cuidado.',cls: 'fair' },
    poor:      { icon: '❌', text: 'Condições ruins — não recomendado.',              cls: 'poor' },
  };

  const pillBorderClass = { green: 'border-success', yellow: 'border-warning', red: 'border-danger' };

  function makeCard({ icon, label, value, unit, sub, pill }) {
    const border = pill ? pillBorderClass[pill] : '';
    return `
      <div class="col-6 col-md-4">
        <div class="glass-card ${border} h-100 p-3 d-flex flex-column align-items-center text-center gap-2">
          <div class="stat-icon">${icon}</div>
          <div class="stat-label">${label}</div>
          <div class="stat-value">${value}</div>
          ${unit ? `<div class="stat-unit">${unit}</div>` : ''}
          ${sub  ? `<div class="stat-sub">${sub}</div>`   : ''}
          ${pill ? `<span class="pill ${pill}">${pillLabel(pill)}</span>` : ''}
        </div>
      </div>`;
  }

  async function searchLocation() {
    const query = document.getElementById('location-input').value.trim();
    if (!query) return;
    showLoading(true);
    clearResults();
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
        { headers: { 'Accept-Language': 'pt-BR' } }
      );
      const data = await res.json();
      if (!data.length) throw new Error('Localização não encontrada. Tente outro nome.');
      const { lat, lon, display_name } = data[0];
      await fetchSurfData(parseFloat(lat), parseFloat(lon), display_name);
    } catch (err) {
      showError(err.message);
    } finally {
      showLoading(false);
    }
  }

  async function fetchSurfData(lat, lon, locationName) {
    const weatherUrl =
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,precipitation` +
      `&wind_speed_unit=kmh&timezone=auto`;

    const marineUrl =
      `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}` +
      `&current=wave_height,wave_period,wave_direction,swell_wave_height,swell_wave_period,swell_wave_direction` +
      `&timezone=auto`;

    const [weatherRes, marineRes] = await Promise.all([fetch(weatherUrl), fetch(marineUrl)]);

    fetchTideData(lat, lon);

    if (!weatherRes.ok) throw new Error('Erro ao buscar dados climáticos.');
    if (!marineRes.ok)  throw new Error('Dados de ondas não disponíveis para esta localização. Tente uma cidade costeira.');

    const { current: wc } = await weatherRes.json();
    const { current: mc } = await marineRes.json();

    const windSpeed  = Math.round(wc.windspeed_10m);
    const windDir    = wc.winddirection_10m;
    const wmoCode    = wc.weathercode;
    const temp       = Math.round(wc.temperature_2m);
    const waveHeight = mc.wave_height?.toFixed(1) ?? '—';
    const wavePeriod = mc.wave_period ? Math.round(mc.wave_period) : null;
    const waveDir    = mc.wave_direction;
    const swellH     = mc.swell_wave_height?.toFixed(1) ?? '—';
    const swellP     = mc.swell_wave_period ? Math.round(mc.swell_wave_period) : null;
    const wInfo      = wmoInfo(wmoCode);

    const rWind    = windRating(windSpeed);
    const rPeriod  = periodRating(wavePeriod ?? 0);
    const rHeight  = heightRating(parseFloat(waveHeight));
    const rWeather = weatherRating(wmoCode);
    const overall  = overallRating(rWind, rPeriod, rHeight, rWeather);
    const rating   = RATINGS[overall];

    const banner = document.getElementById('rating-banner');
    banner.className = `d-flex align-items-center gap-3 p-4 mb-4 ${rating.cls}`;
    banner.classList.add('visible');
    document.getElementById('banner-icon').textContent = rating.icon;
    document.getElementById('banner-text').innerHTML =
      `<strong>${locationName.split(',')[0]}</strong> — ${rating.text}`;

    const cards = [
      { icon: '💨', label: 'Vento',          value: windSpeed,       unit: 'km/h', sub: `Direção: ${compassDir(windDir)} (${windDir}°)`,                           pill: rWind },
      { icon: '🌊', label: 'Altura das Ondas',value: waveHeight,      unit: 'm',    sub: waveDir != null ? `Direção: ${compassDir(waveDir)} (${waveDir}°)` : '',    pill: rHeight },
      { icon: '⏱️', label: 'Período',         value: wavePeriod ?? '—',unit: wavePeriod ? 's' : '', sub: 'Período entre ondas',                                     pill: wavePeriod ? rPeriod : null },
      { icon: wInfo.icon, label: 'Tempo',     value: wInfo.label,    unit: '',     sub: `${temp}°C`,                                                                pill: rWeather },
      { icon: '🌀', label: 'Swell',           value: swellH,         unit: 'm',    sub: swellP ? `Período: ${swellP}s` : '',                                        pill: null },
      { icon: '🌡️', label: 'Temperatura',     value: temp,           unit: '°C',   sub: `Precipitação: ${wc.precipitation} mm`,                                    pill: null },
    ];

    document.getElementById('cards-grid').innerHTML = cards.map(makeCard).join('');
  }

  async function fetchTideData(lat, lon) {
    const dateStr = new Date().toISOString().split('T')[0];
    const url =
      `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}` +
      `&hourly=sea_level_height_msl&start_date=${dateStr}&end_date=${dateStr}&timezone=auto`;

    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();

    const times  = data.hourly?.time ?? [];
    const levels = data.hourly?.sea_level_height_msl ?? [];
    if (!levels.length || levels.every(v => v === null)) return;

    renderTide(times, levels, new Date());
  }

  function renderTide(times, levels, now) {
    const currentHour = now.getHours();
    const fracHour    = now.getMinutes() / 60;

    const valid = levels.filter(v => v !== null);
    const minL  = Math.min(...valid);
    const maxL  = Math.max(...valid);
    const range = maxL - minL || 1;

    const cur  = levels[currentHour] ?? levels[currentHour - 1];
    const next = levels[currentHour + 1] ?? cur;
    const interp = cur + (next - cur) * fracHour;

    document.getElementById('tide-current-val').innerHTML =
      `${interp.toFixed(2)}<small> m</small>`;

    const rising  = next > cur;
    const nearMax = interp >= maxL - range * 0.1;
    const nearMin = interp <= minL + range * 0.1;

    let statusText, statusClass, arrow;
    if (nearMax)      { statusText = '🌕 Maré Cheia'; statusClass = 'cheia';    arrow = '➡️'; }
    else if (nearMin) { statusText = '🌑 Maré Seca';  statusClass = 'seca';     arrow = '➡️'; }
    else if (rising)  { statusText = '📈 Enchendo';   statusClass = 'enchendo'; arrow = '⬆️'; }
    else              { statusText = '📉 Vazando';    statusClass = 'vazando';  arrow = '⬇️'; }

    document.getElementById('tide-arrow').textContent = arrow;
    const badge = document.getElementById('tide-status-badge');
    badge.textContent  = statusText;
    badge.className    = `tide-badge ${statusClass}`;

    // SVG chart
    const W = 860, H = 110, PAD = 10;
    const pts = levels.map((l, i) => {
      if (l === null) return null;
      const x = (i / (levels.length - 1)) * W;
      const y = H - PAD - ((l - minL) / range) * (H - PAD * 2);
      return [x, y];
    }).filter(Boolean);

    const pathD = pts.reduce((acc, [x, y], i) => {
      if (i === 0) return `M${x},${y}`;
      const [px, py] = pts[i - 1];
      const cx = (px + x) / 2;
      return `${acc} C${cx},${py} ${cx},${y} ${x},${y}`;
    }, '');

    const fillD = `${pathD} L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;

    const nowX = ((currentHour + fracHour) / (levels.length - 1)) * W;
    const nowY = H - PAD - ((interp - minL) / range) * (H - PAD * 2);

    document.getElementById('tide-svg').innerHTML = `
      <defs>
        <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.03"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#tg)"/>
      <path d="${pathD}" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="${nowX}" y1="0" x2="${nowX}" y2="${H}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
      <circle cx="${nowX}" cy="${nowY}" r="5" fill="#f59e0b" stroke="#0a1628" stroke-width="2"/>
    `;

    document.getElementById('tide-hours').innerHTML = times.map((t, i) => {
      const h = new Date(t).getHours();
      if (h % 3 !== 0) return '';
      const isNow = h === currentHour;
      const flex  = (i === 0 || i === times.length - 1) ? '0 0 auto' : '1';
      return `<span class="${isNow ? 'now-label' : ''}" style="flex:${flex}">${String(h).padStart(2,'0')}h</span>`;
    }).join('');

    // extremes
    const extremes = [];
    for (let i = 1; i < levels.length - 1; i++) {
      if (levels[i] === null) continue;
      const isHigh = levels[i] > (levels[i-1] ?? -Infinity) && levels[i] > (levels[i+1] ?? -Infinity);
      const isLow  = levels[i] < (levels[i-1] ??  Infinity) && levels[i] < (levels[i+1] ??  Infinity);
      if (isHigh || isLow) {
        extremes.push({ hour: new Date(times[i]).getHours(), type: isHigh ? 'high' : 'low', height: levels[i] });
      }
    }

    document.getElementById('tide-extremes').innerHTML = extremes.map(e => `
      <div class="col-6 col-md-3">
        <div class="tide-extreme">
          <div class="te-time">${String(e.hour).padStart(2,'0')}:00</div>
          <div class="te-type ${e.type}">${e.type === 'high' ? '🌕 Maré Alta' : '🌑 Maré Baixa'}</div>
          <div class="te-height">${e.height.toFixed(2)} m</div>
        </div>
      </div>
    `).join('');

    document.getElementById('tide-section').classList.add('visible');
  }

  async function useMyLocation() {
    if (!navigator.geolocation) {
      showError('Geolocalização não suportada neste navegador.');
      return;
    }

    const btn = document.getElementById('gps-btn');
    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Obtendo localização…';
    showLoading(true);
    clearResults();

    navigator.geolocation.getCurrentPosition(
      async ({ coords }) => {
        try {
          const { latitude: lat, longitude: lon } = coords;
          const res  = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            { headers: { 'Accept-Language': 'pt-BR' } }
          );
          const data = await res.json();
          const name = data.address?.city || data.address?.town || data.address?.village
            || data.display_name || `${lat.toFixed(3)}, ${lon.toFixed(3)}`;

          document.getElementById('location-input').value = name;
          await fetchSurfData(lat, lon, name);
        } catch (err) {
          showError('Erro ao buscar dados para sua localização.');
        } finally {
          resetGpsBtn();
          showLoading(false);
        }
      },
      (err) => {
        resetGpsBtn();
        showLoading(false);
        const msgs = {
          1: 'Permissão de localização negada. Libere o acesso nas configurações do navegador.',
          2: 'Não foi possível determinar sua localização.',
          3: 'Tempo esgotado ao obter localização.',
        };
        showError(msgs[err.code] || 'Erro ao obter localização.');
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function resetGpsBtn() {
    const btn = document.getElementById('gps-btn');
    btn.classList.remove('loading');
    btn.innerHTML = '<i class="bi bi-geo-alt-fill me-2"></i>Usar minha localização';
  }

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
  }

  function clearResults() {
    document.getElementById('cards-grid').innerHTML = '';
    document.getElementById('error-msg').style.display = 'none';
    const banner = document.getElementById('rating-banner');
    banner.className = 'p-4 mb-4';
    banner.classList.remove('visible');
    document.getElementById('tide-section').classList.remove('visible');
    document.getElementById('tide-extremes').innerHTML = '';
    document.getElementById('tide-hours').innerHTML = '';
    document.getElementById('tide-svg').innerHTML = '';
    document.getElementById('tide-current-val').innerHTML = '—<small> m</small>';
    document.getElementById('tide-arrow').textContent = '';
    document.getElementById('tide-status-badge').textContent = '—';
    document.getElementById('tide-status-badge').className = 'tide-badge';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('location-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchLocation();
  });
</script>
</body>
</html>
