<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Check</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0a1628 0%, #0d2b4e 50%, #0a3a5c 100%);
      color: #e2f0fb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    header h1 span {
      color: #38bdf8;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-top: 6px;
    }

    #location-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
      width: 100%;
      max-width: 500px;
    }

    #location-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #1e4a70;
      background: rgba(255,255,255,0.06);
      color: #e2f0fb;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    #location-bar input::placeholder { color: #64748b; }
    #location-bar input:focus { border-color: #38bdf8; }

    #location-bar button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      background: #38bdf8;
      color: #0a1628;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #location-bar button:hover { background: #7dd3fc; }
    #location-bar button:active { transform: scale(0.97); }

    #gps-btn {
      padding: 12px 14px;
      background: rgba(56,189,248,0.12);
      color: #38bdf8;
      border: 1px solid #1e4a70;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    #gps-btn:hover { background: rgba(56,189,248,0.25); color: #7dd3fc; }
    #gps-btn.loading { animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    #rating-banner {
      width: 100%;
      max-width: 860px;
      border-radius: 18px;
      padding: 20px 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.2rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #rating-banner.visible { opacity: 1; }
    #rating-banner.excellent { background: linear-gradient(90deg, #064e3b, #065f46); border: 1px solid #10b981; color: #6ee7b7; }
    #rating-banner.good      { background: linear-gradient(90deg, #0c4a6e, #075985); border: 1px solid #38bdf8; color: #bae6fd; }
    #rating-banner.fair      { background: linear-gradient(90deg, #451a03, #78350f); border: 1px solid #f59e0b; color: #fde68a; }
    #rating-banner.poor      { background: linear-gradient(90deg, #450a0a, #7f1d1d); border: 1px solid #f87171; color: #fca5a5; }

    #rating-banner .icon { font-size: 2rem; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
      transition: transform 0.2s, border-color 0.3s;
    }

    .card:hover { transform: translateY(-3px); }

    .card.good-indicator  { border-color: #10b981; }
    .card.fair-indicator  { border-color: #f59e0b; }
    .card.poor-indicator  { border-color: #ef4444; }

    .card .card-icon { font-size: 2.2rem; }

    .card .card-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
    }

    .card .card-value {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1;
    }

    .card .card-unit {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .card .card-sub {
      font-size: 0.82rem;
      color: #7dd3fc;
      text-align: center;
    }

    .card .pill {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .pill.green  { background: #064e3b; color: #6ee7b7; }
    .pill.yellow { background: #451a03; color: #fde68a; }
    .pill.red    { background: #450a0a; color: #fca5a5; }

    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 60px;
      color: #64748b;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      border-radius: 12px;
      padding: 16px 24px;
      margin-top: 20px;
      max-width: 500px;
      text-align: center;
    }

    /* Tide section */
    #tide-section {
      width: 100%;
      max-width: 860px;
      margin-top: 28px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #tide-section.visible { opacity: 1; }

    #tide-section h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .tide-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 24px 24px 20px;
      backdrop-filter: blur(8px);
    }

    .tide-now {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .tide-now-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tide-now-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
    }

    .tide-now-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1;
    }

    .tide-now-value span {
      font-size: 1rem;
      color: #94a3b8;
      font-weight: 400;
    }

    .tide-status-badge {
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .tide-status-badge.enchendo  { background: #0c4a6e; color: #38bdf8; border: 1px solid #38bdf8; }
    .tide-status-badge.vazando   { background: #451a03; color: #fb923c; border: 1px solid #fb923c; }
    .tide-status-badge.cheia     { background: #064e3b; color: #34d399; border: 1px solid #34d399; }
    .tide-status-badge.seca      { background: #3b0764; color: #c084fc; border: 1px solid #c084fc; }

    .tide-trend-arrow {
      font-size: 1.8rem;
    }

    /* SVG chart */
    .tide-chart-wrap {
      position: relative;
      width: 100%;
    }

    .tide-chart-wrap svg {
      width: 100%;
      height: 140px;
      overflow: visible;
    }

    .tide-hours {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 2px;
    }

    .tide-hours span {
      font-size: 0.7rem;
      color: #475569;
      text-align: center;
      flex: 1;
    }

    .tide-hours span.now-label {
      color: #38bdf8;
      font-weight: 700;
    }

    /* extremes list */
    .tide-extremes {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .tide-extreme-item {
      flex: 1;
      min-width: 100px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tide-extreme-item .te-time {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tide-extreme-item .te-type {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .te-type.high { color: #34d399; }
    .te-type.low  { color: #c084fc; }

    .tide-extreme-item .te-height {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    footer {
      margin-top: 48px;
      color: #334155;
      font-size: 0.78rem;
      text-align: center;
    }

    footer a { color: #475569; }
  </style>
</head>
<body>

<header>
  <h1>🌊 Wave<span>Check</span></h1>
  <p>Condições de surf em tempo real</p>
</header>

<div id="location-bar">
  <input type="text" id="location-input" placeholder="Ex: Florianópolis, Ubatuba, Rio de Janeiro…" />
  <button id="gps-btn" onclick="useMyLocation()" title="Usar minha localização">📍</button>
  <button onclick="searchLocation()">Buscar</button>
</div>

<div id="rating-banner">
  <span class="icon" id="banner-icon"></span>
  <span id="banner-text"></span>
</div>

<div class="cards-grid" id="cards-grid"></div>

<section id="tide-section">
  <h2>🌊 Tábua de Maré</h2>
  <div class="tide-card">
    <div class="tide-now">
      <div class="tide-now-main">
        <div class="tide-now-label">Maré Atual</div>
        <div class="tide-now-value" id="tide-current-val">—<span> m</span></div>
      </div>
      <div class="tide-trend-arrow" id="tide-arrow">—</div>
      <div class="tide-status-badge" id="tide-status-badge">—</div>
    </div>
    <div class="tide-chart-wrap">
      <svg id="tide-svg" viewBox="0 0 860 140" preserveAspectRatio="none"></svg>
      <div class="tide-hours" id="tide-hours"></div>
    </div>
    <div class="tide-extremes" id="tide-extremes"></div>
  </div>
</section>

<div id="loading">
  <div class="spinner"></div>
  <span>Carregando dados...</span>
</div>

<div id="error-msg"></div>

<footer>
  Dados fornecidos por <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &amp;
  <a href="https://nominatim.openstreetmap.org" target="_blank">OpenStreetMap Nominatim</a>
</footer>

<script>
  const WMO_CODES = {
    0:  { label: 'Céu limpo',         icon: '☀️' },
    1:  { label: 'Predominante limpo', icon: '🌤️' },
    2:  { label: 'Parcialmente nublado',icon: '⛅' },
    3:  { label: 'Nublado',            icon: '☁️' },
    45: { label: 'Neblina',            icon: '🌫️' },
    48: { label: 'Neblina com gelo',   icon: '🌫️' },
    51: { label: 'Garoa leve',         icon: '🌦️' },
    53: { label: 'Garoa moderada',     icon: '🌦️' },
    55: { label: 'Garoa intensa',      icon: '🌧️' },
    61: { label: 'Chuva leve',         icon: '🌧️' },
    63: { label: 'Chuva moderada',     icon: '🌧️' },
    65: { label: 'Chuva forte',        icon: '🌧️' },
    80: { label: 'Pancadas leves',     icon: '🌦️' },
    81: { label: 'Pancadas moderadas', icon: '🌧️' },
    82: { label: 'Pancadas intensas',  icon: '⛈️' },
    95: { label: 'Tempestade',         icon: '⛈️' },
    99: { label: 'Tempestade c/ granizo', icon: '⛈️' },
  };

  function wmoInfo(code) {
    return WMO_CODES[code] || { label: 'Desconhecido', icon: '❓' };
  }

  function compassDir(deg) {
    const dirs = ['N','NE','L','SE','S','SO','O','NO'];
    return dirs[Math.round(deg / 45) % 8];
  }

  function windRating(speed) {
    if (speed < 15) return 'green';
    if (speed < 25) return 'yellow';
    return 'red';
  }

  function periodRating(period) {
    if (period >= 12) return 'green';
    if (period >= 8)  return 'yellow';
    return 'red';
  }

  function waveHeightRating(h) {
    if (h >= 1 && h <= 2.5) return 'green';
    if (h > 0.3 && h < 4)   return 'yellow';
    return 'red';
  }

  function weatherRating(code) {
    if (code <= 2)  return 'green';
    if (code <= 55) return 'yellow';
    return 'red';
  }

  function pillLabel(color) {
    return { green: 'Ótimo', yellow: 'Regular', red: 'Ruim' }[color];
  }

  function overallRating(wind, period, height, weather) {
    const scores = { green: 3, yellow: 2, red: 1 };
    const total = scores[wind] + scores[period] + scores[height] * 1.2 + scores[weather] * 0.8;
    const max = 3 + 3 + 3.6 + 2.4;
    const pct = total / max;
    if (pct >= 0.8) return 'excellent';
    if (pct >= 0.6) return 'good';
    if (pct >= 0.4) return 'fair';
    return 'poor';
  }

  const ratingInfo = {
    excellent: { icon: '🏄', text: 'Condições excelentes — hora de pegar as ondas!', cls: 'excellent' },
    good:      { icon: '✅', text: 'Boas condições para surfar.',                     cls: 'good' },
    fair:      { icon: '⚠️', text: 'Condições regulares — surf possível com cuidado.', cls: 'fair' },
    poor:      { icon: '❌', text: 'Condições ruins — não recomendado.',              cls: 'poor' },
  };

  function makeCard({ icon, label, value, unit, sub, pill }) {
    const pillClass = pill ? `pill ${pill}` : '';
    return `
      <div class="card ${pill ? pill + '-indicator' : ''}">
        <div class="card-icon">${icon}</div>
        <div class="card-label">${label}</div>
        <div class="card-value">${value}</div>
        ${unit ? `<div class="card-unit">${unit}</div>` : ''}
        ${sub  ? `<div class="card-sub">${sub}</div>`   : ''}
        ${pill ? `<span class="${pillClass}">${pillLabel(pill)}</span>` : ''}
      </div>`;
  }

  async function searchLocation() {
    const query = document.getElementById('location-input').value.trim();
    if (!query) return;

    showLoading(true);
    clearResults();

    try {
      const geoRes = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
        { headers: { 'Accept-Language': 'pt-BR' } }
      );
      const geoData = await geoRes.json();

      if (!geoData.length) throw new Error('Localização não encontrada. Tente outro nome.');

      const { lat, lon, display_name } = geoData[0];
      await fetchSurfData(parseFloat(lat), parseFloat(lon), display_name);
    } catch (err) {
      showError(err.message);
    } finally {
      showLoading(false);
    }
  }

  async function fetchSurfData(lat, lon, locationName) {
    const weatherUrl =
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,precipitation` +
      `&wind_speed_unit=kmh&timezone=auto`;

    const marineUrl =
      `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}` +
      `&current=wave_height,wave_period,wave_direction,swell_wave_height,swell_wave_period,swell_wave_direction` +
      `&timezone=auto`;

    const [weatherRes, marineRes] = await Promise.all([
      fetch(weatherUrl),
      fetch(marineUrl),
    ]);

    // fire tide fetch without blocking — renders independently
    fetchTideData(lat, lon);

    if (!weatherRes.ok) throw new Error('Erro ao buscar dados climáticos.');
    if (!marineRes.ok)  throw new Error('Dados de ondas não disponíveis para esta localização. Tente uma cidade costeira.');

    const weather = await weatherRes.json();
    const marine  = await marineRes.json();

    const wc  = weather.current;
    const mc  = marine.current;

    const windSpeed    = Math.round(wc.windspeed_10m);
    const windDir      = wc.winddirection_10m;
    const wmoCode      = wc.weathercode;
    const temp         = Math.round(wc.temperature_2m);
    const waveHeight   = mc.wave_height?.toFixed(1) ?? '—';
    const wavePeriod   = mc.wave_period ? Math.round(mc.wave_period) : null;
    const waveDir      = mc.wave_direction;
    const swellHeight  = mc.swell_wave_height?.toFixed(1) ?? '—';
    const swellPeriod  = mc.swell_wave_period ? Math.round(mc.swell_wave_period) : null;

    const wInfo = wmoInfo(wmoCode);

    const rWind    = windRating(windSpeed);
    const rPeriod  = periodRating(wavePeriod ?? 0);
    const rHeight  = waveHeightRating(parseFloat(waveHeight));
    const rWeather = weatherRating(wmoCode);
    const overall  = overallRating(rWind, rPeriod, rHeight, rWeather);

    const banner = document.getElementById('rating-banner');
    banner.className = `rating-banner visible ${ratingInfo[overall].cls}`;
    document.getElementById('banner-icon').textContent = ratingInfo[overall].icon;
    document.getElementById('banner-text').innerHTML =
      `<strong>${locationName.split(',')[0]}</strong> — ${ratingInfo[overall].text}`;

    const cards = [
      {
        icon: '💨', label: 'Vento', value: windSpeed, unit: 'km/h',
        sub: `Direção: ${compassDir(windDir)} (${windDir}°)`,
        pill: rWind,
      },
      {
        icon: '🌊', label: 'Altura das Ondas', value: waveHeight, unit: 'm',
        sub: waveDir != null ? `Direção: ${compassDir(waveDir)} (${waveDir}°)` : '',
        pill: rHeight,
      },
      {
        icon: '⏱️', label: 'Período das Ondas', value: wavePeriod ?? '—', unit: wavePeriod ? 's' : '',
        sub: 'Período entre ondas',
        pill: wavePeriod ? rPeriod : null,
      },
      {
        icon: wInfo.icon, label: 'Tempo', value: wInfo.label, unit: '',
        sub: `${temp}°C`,
        pill: rWeather,
      },
      {
        icon: '🌀', label: 'Swell', value: swellHeight, unit: 'm',
        sub: swellPeriod ? `Período: ${swellPeriod}s` : '',
        pill: null,
      },
      {
        icon: '🌡️', label: 'Temperatura', value: temp, unit: '°C',
        sub: `Precipitação: ${wc.precipitation} mm`,
        pill: null,
      },
    ];

    document.getElementById('cards-grid').innerHTML = cards.map(makeCard).join('');
  }

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
  }

  function clearResults() {
    document.getElementById('cards-grid').innerHTML = '';
    document.getElementById('error-msg').style.display = 'none';
    const banner = document.getElementById('rating-banner');
    banner.className = 'rating-banner';
    document.getElementById('tide-section').classList.remove('visible');
    document.getElementById('tide-extremes').innerHTML = '';
    document.getElementById('tide-hours').innerHTML = '';
    document.getElementById('tide-svg').innerHTML = '';
    document.getElementById('tide-current-val').innerHTML = '—<span> m</span>';
    document.getElementById('tide-arrow').textContent = '—';
    document.getElementById('tide-status-badge').textContent = '—';
    document.getElementById('tide-status-badge').className = 'tide-status-badge';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function fetchTideData(lat, lon) {
    const today = new Date();
    const dateStr = today.toISOString().split('T')[0];

    const url =
      `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}` +
      `&hourly=sea_level_height_msl&start_date=${dateStr}&end_date=${dateStr}&timezone=auto`;

    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();

    const times  = data.hourly?.time ?? [];
    const levels = data.hourly?.sea_level_height_msl ?? [];

    if (!levels.length || levels.every(v => v === null)) return;

    renderTide(times, levels, today);
  }

  function renderTide(times, levels, now) {
    const currentHour = now.getHours();
    const currentMin  = now.getMinutes();
    const currentIdx  = currentHour; // one entry per hour

    const validLevels = levels.filter(v => v !== null);
    const minL = Math.min(...validLevels);
    const maxL = Math.max(...validLevels);
    const range = maxL - minL || 1;

    const currentLevel = levels[currentIdx] ?? levels[currentIdx - 1];
    const nextLevel    = levels[currentIdx + 1] ?? currentLevel;
    const prevLevel    = levels[currentIdx - 1] ?? currentLevel;

    // interpolate within the current hour
    const fracHour = currentMin / 60;
    const interpolated = currentLevel + (nextLevel - currentLevel) * fracHour;

    document.getElementById('tide-current-val').innerHTML =
      `${interpolated.toFixed(2)}<span> m</span>`;

    // status
    const rising = nextLevel > currentLevel;
    const nearMax = interpolated >= maxL - range * 0.1;
    const nearMin = interpolated <= minL + range * 0.1;

    let statusText, statusClass, arrow;
    if (nearMax)       { statusText = '🌕 Maré Cheia';   statusClass = 'cheia';    arrow = '➡️'; }
    else if (nearMin)  { statusText = '🌑 Maré Seca';    statusClass = 'seca';     arrow = '➡️'; }
    else if (rising)   { statusText = '📈 Enchendo';     statusClass = 'enchendo'; arrow = '⬆️'; }
    else               { statusText = '📉 Vazando';      statusClass = 'vazando';  arrow = '⬇️'; }

    document.getElementById('tide-arrow').textContent = arrow;
    const badge = document.getElementById('tide-status-badge');
    badge.textContent = statusText;
    badge.className = `tide-status-badge ${statusClass}`;

    // SVG chart
    const W = 860, H = 120, PAD = 10;
    const pts = levels.map((l, i) => {
      if (l === null) return null;
      const x = (i / (levels.length - 1)) * W;
      const y = H - PAD - ((l - minL) / range) * (H - PAD * 2);
      return [x, y];
    }).filter(Boolean);

    // smooth curve
    const pathD = pts.reduce((acc, [x, y], i) => {
      if (i === 0) return `M${x},${y}`;
      const [px, py] = pts[i - 1];
      const cx = (px + x) / 2;
      return `${acc} C${cx},${py} ${cx},${y} ${x},${y}`;
    }, '');

    // fill below
    const fillD = `${pathD} L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;

    // now line x position
    const nowFrac = (currentHour + fracHour) / (levels.length - 1);
    const nowX = nowFrac * W;
    const nowY = H - PAD - ((interpolated - minL) / range) * (H - PAD * 2);

    document.getElementById('tide-svg').innerHTML = `
      <defs>
        <linearGradient id="tideGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.03"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#tideGrad)" />
      <path d="${pathD}" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="${nowX}" y1="0" x2="${nowX}" y2="${H}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
      <circle cx="${nowX}" cy="${nowY}" r="5" fill="#f59e0b" stroke="#0a1628" stroke-width="2"/>
    `;

    // hour labels — show every 3h
    const hoursEl = document.getElementById('tide-hours');
    hoursEl.innerHTML = times.map((t, i) => {
      const h = new Date(t).getHours();
      if (h % 3 !== 0) return '';
      const isNow = h === currentHour;
      return `<span class="${isNow ? 'now-label' : ''}" style="flex:${i === 0 || i === times.length-1 ? '0.5' : '3'}">${String(h).padStart(2,'0')}h</span>`;
    }).join('');

    // extremes (local min/max)
    const extremes = [];
    for (let i = 1; i < levels.length - 1; i++) {
      if (levels[i] === null) continue;
      const isHigh = levels[i] > (levels[i-1] ?? -Infinity) && levels[i] > (levels[i+1] ?? -Infinity);
      const isLow  = levels[i] < (levels[i-1] ?? Infinity)  && levels[i] < (levels[i+1] ?? Infinity);
      if (isHigh || isLow) {
        const t = new Date(times[i]);
        extremes.push({ hour: t.getHours(), type: isHigh ? 'high' : 'low', height: levels[i] });
      }
    }

    document.getElementById('tide-extremes').innerHTML = extremes.map(e => `
      <div class="tide-extreme-item">
        <div class="te-time">${String(e.hour).padStart(2,'0')}:00</div>
        <div class="te-type ${e.type}">${e.type === 'high' ? '🌕 Maré Alta' : '🌑 Maré Baixa'}</div>
        <div class="te-height">${e.height.toFixed(2)} m</div>
      </div>
    `).join('');

    document.getElementById('tide-section').classList.add('visible');
  }

  async function useMyLocation() {
    if (!navigator.geolocation) {
      showError('Geolocalização não suportada neste navegador.');
      return;
    }

    const btn = document.getElementById('gps-btn');
    btn.classList.add('loading');
    btn.textContent = '⏳';
    showLoading(true);
    clearResults();

    navigator.geolocation.getCurrentPosition(
      async ({ coords }) => {
        try {
          const { latitude: lat, longitude: lon } = coords;

          // reverse geocode to get city name
          const geoRes = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            { headers: { 'Accept-Language': 'pt-BR' } }
          );
          const geoData = await geoRes.json();
          const name = geoData.address?.city
            || geoData.address?.town
            || geoData.address?.village
            || geoData.display_name
            || `${lat.toFixed(3)}, ${lon.toFixed(3)}`;

          document.getElementById('location-input').value = name;
          await fetchSurfData(lat, lon, name);
        } catch (err) {
          showError('Erro ao buscar dados para sua localização.');
        } finally {
          btn.classList.remove('loading');
          btn.textContent = '📍';
          showLoading(false);
        }
      },
      (err) => {
        btn.classList.remove('loading');
        btn.textContent = '📍';
        showLoading(false);
        const msgs = {
          1: 'Permissão de localização negada. Libere o acesso nas configurações do navegador.',
          2: 'Não foi possível determinar sua localização.',
          3: 'Tempo esgotado ao obter localização.',
        };
        showError(msgs[err.code] || 'Erro ao obter localização.');
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  document.getElementById('location-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchLocation();
  });
</script>
